name: TestFlight

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "What to run"
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - setup-app
  push:
    branches:
      - app/ebb
      - main
      - "cursor/**"
    paths:
      - "BasicApp/**"
      - ".github/workflows/testflight.yml"

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-simulator:
    name: Build (Simulator)
    runs-on: macos-15
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project BasicApp/BasicApp.xcodeproj \
            -scheme BasicApp \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO

  setup-app:
    name: Register app with Apple (one-time)
    runs-on: macos-15
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'setup-app'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: BasicApp

      - name: Register bundle ID and App Store Connect app
        working-directory: BasicApp
        env:
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: bundle exec fastlane setup_app

  deploy-testflight:
    name: Deploy to TestFlight
    runs-on: macos-15
    if: >-
      github.event_name != 'pull_request' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'deploy')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: BasicApp

      - name: Build and upload to TestFlight
        working-directory: BasicApp
        env:
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          BUILD_NUMBER: ${{ github.run_number }}
          CI: true
        run: bundle exec fastlane beta
