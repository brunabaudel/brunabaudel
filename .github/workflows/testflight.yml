name: TestFlight

on:
  workflow_dispatch:
    inputs:
      deploy_testflight:
        description: Build, archive, and upload to TestFlight
        type: boolean
        default: true
  pull_request:
    paths:
      - "Ebb/**"
      - ".github/workflows/testflight.yml"
  push:
    branches:
      - app/ebb
      - main
    paths:
      - "Ebb/**"
      - ".github/workflows/testflight.yml"

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PRs run unit tests only (no screenshots).
  build-simulator:
    name: Build & Test (Simulator)
    runs-on: macos-26
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Build and run unit tests on iOS Simulator
        run: |
          xcodebuild test \
            -project Ebb/Ebb.xcodeproj \
            -scheme Ebb \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 17" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO

  deploy-testflight:
    name: Deploy to TestFlight
    # Apple requires the iOS 26 SDK for App Store uploads; macos-26 defaults to Xcode 26.x
    runs-on: macos-26
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_testflight)
    steps:
      - uses: actions/checkout@v4

      - name: Configure App Store Connect API key
        env:
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          KEY_FILE="$KEY_DIR/AuthKey_${APPSTORE_API_KEY_ID}.p8"
          mkdir -p "$KEY_DIR"
          printf '%s\n' "$APPSTORE_API_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          if ! grep -q "BEGIN PRIVATE KEY" "$KEY_FILE"; then
            echo "APPSTORE_API_PRIVATE_KEY secret is missing BEGIN PRIVATE KEY header"
            exit 1
          fi

      - name: Set build number
        run: |
          cd Ebb
          agvtool new-version -all "${{ github.run_number }}"

      - name: Register bundle ID
        env:
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
        run: |
          gem install fastlane --no-document
          ruby Ebb/ci/register_bundle_id.rb

      - name: Verify App Store Connect app exists
        env:
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
        run: |
          gem install fastlane --no-document
          ruby Ebb/ci/verify_app_store_connect_app.rb

      - name: Install Apple Distribution certificate
        uses: ./.github/actions/setup-apple-signing
        with:
          certificate-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          certificate-password: ${{ secrets.P12_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Prune ephemeral Apple certificates
        env:
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
        run: |
          gem install fastlane --no-document
          ruby Ebb/ci/prune_ephemeral_certificates.rb

      - name: Create TestFlight internal group and add testers
        env:
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
        run: ruby Ebb/ci/create_beta_group.rb

      - name: Ensure App Store provisioning profile
        env:
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
        run: |
          gem install fastlane --no-document
          ruby Ebb/ci/ensure_app_store_profile.rb > "$RUNNER_TEMP/profile.txt"
          cat "$RUNNER_TEMP/profile.txt"
          grep -q '^PROFILE_NAME=' "$RUNNER_TEMP/profile.txt" || {
            echo "ensure_app_store_profile.rb did not emit PROFILE_NAME"
            exit 1
          }
          echo "PROFILE_UUID=$(grep '^PROFILE_UUID=' "$RUNNER_TEMP/profile.txt" | cut -d= -f2-)" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$(grep '^PROFILE_NAME=' "$RUNNER_TEMP/profile.txt" | cut -d= -f2-)" >> "$GITHUB_ENV"

      - name: Build archive
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          xcodebuild archive \
            -project Ebb/Ebb.xcodeproj \
            -scheme Ebb \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Ebb.xcarchive" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"

      - name: Export IPA
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          EXPORT_PLIST="$RUNNER_TEMP/ExportOptions.plist"
          cp Ebb/ExportOptions.plist "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Add :teamID string $DEVELOPMENT_TEAM" "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.bcbs.ebb string $PROFILE_NAME" "$EXPORT_PLIST"

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Ebb.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$EXPORT_PLIST"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ runner.temp }}/export/Ebb.ipa
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
