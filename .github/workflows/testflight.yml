name: TestFlight

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "Ebb/**"
      - ".github/workflows/testflight.yml"
  push:
    branches:
      - app/ebb
      - main
    paths:
      - "Ebb/**"
      - ".github/workflows/testflight.yml"

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-simulator:
    name: Build & Test (Simulator)
    runs-on: macos-26
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Build and run unit tests on iOS Simulator
        run: |
          xcodebuild test \
            -project Ebb/Ebb.xcodeproj \
            -scheme Ebb \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 17" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO

      - name: Capture app screenshots
        run: |
          chmod +x Ebb/ci/capture_screenshots.sh Ebb/ci/write_screenshot_summary.sh
          Ebb/ci/capture_screenshots.sh screenshots --skip-build --derived-data "$RUNNER_TEMP/DerivedData"

      - name: Add screenshots to job summary
        if: always() && hashFiles('screenshots/*.png') != ''
        run: Ebb/ci/write_screenshot_summary.sh screenshots

      - name: Upload screenshots
        if: always() && hashFiles('screenshots/*.png') != ''
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          if-no-files-found: error

  deploy-testflight:
    name: Deploy to TestFlight
    # Apple requires the iOS 26 SDK for App Store uploads; macos-26 defaults to Xcode 26.x
    runs-on: macos-26
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Configure App Store Connect API key
        env:
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          KEY_FILE="$KEY_DIR/AuthKey_${APPSTORE_API_KEY_ID}.p8"
          mkdir -p "$KEY_DIR"
          printf '%s\n' "$APPSTORE_API_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          if ! grep -q "BEGIN PRIVATE KEY" "$KEY_FILE"; then
            echo "APPSTORE_API_PRIVATE_KEY secret is missing BEGIN PRIVATE KEY header"
            exit 1
          fi

      - name: Set build number
        run: |
          cd Ebb
          agvtool new-version -all "${{ github.run_number }}"

      - name: Register bundle ID
        env:
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
        run: |
          gem install fastlane --no-document
          ruby Ebb/ci/register_bundle_id.rb

      - name: Verify App Store Connect app exists
        env:
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
        run: |
          gem install fastlane --no-document
          ruby Ebb/ci/verify_app_store_connect_app.rb

      - name: Create TestFlight internal group and add testers
        env:
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
        run: ruby Ebb/ci/create_beta_group.rb

      - name: Build archive
        env:
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          KEY_FILE="$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8"

          xcodebuild archive \
            -project Ebb/Ebb.xcodeproj \
            -scheme Ebb \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Ebb.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_FILE" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Automatic

      - name: Export IPA
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
        run: |
          EXPORT_PLIST="$RUNNER_TEMP/ExportOptions.plist"
          cp Ebb/ExportOptions.plist "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Add :teamID string $DEVELOPMENT_TEAM" "$EXPORT_PLIST"

          KEY_FILE="$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8"

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Ebb.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$EXPORT_PLIST" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_FILE" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ runner.temp }}/export/Ebb.ipa
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Capture app screenshots
        run: |
          chmod +x Ebb/ci/capture_screenshots.sh Ebb/ci/write_screenshot_summary.sh
          Ebb/ci/capture_screenshots.sh screenshots

      - name: Add screenshots to job summary
        if: always() && hashFiles('screenshots/*.png') != ''
        run: Ebb/ci/write_screenshot_summary.sh screenshots

      - name: Upload screenshots
        if: always() && hashFiles('screenshots/*.png') != ''
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          if-no-files-found: error
