name: Set up Apple signing certificate
description: Import one Apple Distribution .p12 from GitHub secrets into a temporary keychain.

inputs:
  certificate-base64:
    description: Base64-encoded Apple Distribution .p12
    required: true
  certificate-password:
    description: Password for the .p12 file
    required: true
  keychain-password:
    description: Password for the temporary CI keychain
    required: true

runs:
  using: composite
  steps:
    - name: Import Apple Distribution certificate
      shell: bash
      env:
        BUILD_CERTIFICATE_BASE64: ${{ inputs.certificate-base64 }}
        P12_PASSWORD: ${{ inputs.certificate-password }}
        KEYCHAIN_PASSWORD: ${{ inputs.keychain-password }}
      run: |
        set -euo pipefail

        if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
          echo "Missing Apple Distribution certificate secret."
          echo "Add BUILD_CERTIFICATE_BASE64 with one exported .p12 from Apple Developer."
          exit 1
        fi

        CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
        KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

        echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        security import "$CERTIFICATE_PATH" \
          -P "$P12_PASSWORD" \
          -A \
          -t cert \
          -f pkcs12 \
          -k "$KEYCHAIN_PATH"

        security set-key-partition-list \
          -S apple-tool:,apple:,codesign: \
          -s \
          -k "$KEYCHAIN_PASSWORD" \
          "$KEYCHAIN_PATH"

        security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

        echo "Imported Apple Distribution certificate into $KEYCHAIN_PATH"
