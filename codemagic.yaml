# Codemagic CI for the Ebb iOS app (branch app/ebb).
# One-time dashboard setup: Ebb/CODEMAGIC_SETUP.md

workflows:
  ebb-unit-tests:
    name: Ebb — Unit tests
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: Ebb/Ebb.xcodeproj
        XCODE_SCHEME: Ebb
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: app/ebb
          include: true
          source: true
      cancel_previous_builds: true
    when:
      changeset:
        includes:
          - Ebb/**
          - codemagic.yaml
    scripts:
      - name: Run unit tests on iOS Simulator
        script: |
          set -euo pipefail
          DESTINATION="$(bash Ebb/ci/resolve_simulator_destination.sh)"
          xcodebuild test \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination "$DESTINATION" \
            -derivedDataPath /tmp/DerivedData \
            CODE_SIGNING_ALLOWED=NO

  ebb-testflight:
    name: Ebb — TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Must match the API key name in Codemagic → Team integrations → Developer Portal.
      app_store_connect: ebb
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bcbs.ebb
      groups:
        - ebb_apple_credentials
      vars:
        XCODE_PROJECT: Ebb/Ebb.xcodeproj
        XCODE_SCHEME: Ebb
        BUNDLE_ID: com.bcbs.ebb
        DEVELOPMENT_TEAM: "3F274MB2RL"
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: app/ebb
          include: true
      cancel_previous_builds: true
    when:
      changeset:
        includes:
          - Ebb/**
          - codemagic.yaml
    scripts:
      - name: Configure App Store Connect API key for Ruby scripts
        script: bash Ebb/ci/write_app_store_connect_api_key.sh
      - name: Set build number
        script: |
          set -euo pipefail
          cd Ebb
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Register bundle ID and verify App Store Connect app
        script: |
          set -euo pipefail
          gem install fastlane --no-document
          ruby Ebb/ci/register_bundle_id.rb
          ruby Ebb/ci/verify_app_store_connect_app.rb
      - name: Ensure App Store provisioning profile
        script: |
          set -euo pipefail
          gem install fastlane --no-document
          ruby Ebb/ci/ensure_app_store_profile.rb
      - name: Create TestFlight internal group
        script: ruby Ebb/ci/create_beta_group.rb
      - name: Set up code signing on Xcode project
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          set -euo pipefail
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Ebb Internal
